# ============================================================
# WebRTC-Live Docker Compose 编排文件 (PVE PaaS 规范版)
#
# 功能说明：部署 WebRTC 直播系统，包含 Flask 业务代理与 SRS 媒体服务器
# 符合 10.0.6.65 物理环境规约：
#   - 禁止 version 声明
#   - 强制命名卷持久化
#   - 使用共享外部网络 my-apps_app-network
# ============================================================

services:
  # ------------------------------------------------------------
  # WebRTC 后端业务代理 (Flask)
  # ------------------------------------------------------------
  webrtc-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webrtc-app
    restart: always
    env_file:
      - .env
    ports:
      - "3001:5000"  # 物理机 3001 -> 容器 5000
    volumes:
      - webrtc_recordings:/app/backend/recordings  # 命名卷持久化
      - ./frontend:/app/frontend:ro               # 前端静态资源只读挂载
    networks:
      - my-apps_app-network
    depends_on:
      - webrtc-srs

  # ------------------------------------------------------------
  # SRS 5.0 流媒体服务器 (Media Server)
  # ------------------------------------------------------------
  webrtc-srs:
    image: ossrs/srs:5
    container_name: webrtc-srs
    restart: always
    environment:
      # CANDIDATE: 必须指定宿主机 IP，否则 WebRTC 握手将失败
      - CANDIDATE=10.0.6.65
    ports:
      - "1935:1935"      # RTMP 推流端口
      - "8000:8000/udp"  # WebRTC UDP 媒体传输端口
      # 1985 (API) 移除了宿主机映射，仅限网格内访问
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf:ro
      - srs_data:/usr/local/srs/objs
    networks:
      webrtc_app_net:
        aliases:
          - webrtc-srs
      my-apps_app-network:
        aliases:
          - webrtc-srs

# ------------------------------------------------------------
# 卷与网络定义
# ------------------------------------------------------------
volumes:
  webrtc_recordings:
    name: webrtc_recordings
  srs_data:
    name: webrtc_srs_data

networks:
  # 内部隔离网络 (可选，用于 SRS 内部别名稳定)
  webrtc_app_net:
    driver: bridge
  # PaaS 共享业务网络 (已预创建)
  my-apps_app-network:
    external: true
