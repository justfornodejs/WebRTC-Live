# ============================================================
# SRS 流媒体服务器配置文件
# 支持 RTMP 接收、WebRTC 推拉流
# 注意：API 仅使用 HTTP（Flask 代理负责对外提供 HTTPS）
# ============================================================

# 全局配置
listen              1935;           # RTMP 监听端口
max_connections     1000;           # 最大连接数
daemon              off;            # 前台运行（Docker 需要）
srs_log_tank        console;        # 日志输出到控制台

# HTTP API 配置（仅内部使用，Flask 代理转发信令）
# 不启用 HTTPS —— 浏览器不直连 SRS，无需 SSL
http_api {
    enabled         on;
    listen          1985;           # HTTP API 端口（仅供 Flask 后端访问）
}

# HTTP 服务器配置
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# WebRTC 配置
rtc_server {
    enabled         on;
    listen          8000;           # UDP 端口，用于 WebRTC 媒体传输
    # 候选地址：部署时改为服务器局域网 IP
    candidate       $CANDIDATE;
}

# 直播流配置
vhost __defaultVhost__ {
    # 开启 RTC（WebRTC）
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }

    # 开启 HTTP-FLV（可选）
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # 开启 DVR（数字视频录制）
    dvr {
        enabled     on;
        # 录制路径（映射到 Docker 容器内路径）
        dvr_path    ./objs/nginx/html/dvr/[stream]/[2006]/[01]/[15]/[04]-[20]_[15]_[02]_[9999].flv;
        # 录制计划：所有时间都录制
        dvr_plan    session;
        # 录制时长：单个文件最长录制时间（秒）
        dvr_duration    3600;
        # 等待关键帧：确保文件完整
        wait_keyframe   no;
    }
}
